<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>功能页</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --line: #d9e1ef;
      --text: #1f2937;
      --primary: #1f6feb;
      --primary-hover: #1858bd;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef3ff 0%, var(--bg) 50%, #eef8f5 100%);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    .wrap {
      max-width: 760px;
      width: 100%;
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(40, 56, 90, 0.08);
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .chat-box {
      height: 420px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fbfdff;
    }

    .row {
      margin-bottom: 10px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .role-user {
      color: #0b6bcb;
    }

    .role-assistant {
      color: #0b8a5b;
    }

    .input-area {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }

    textarea {
      flex: 1;
      min-height: 60px;
      resize: vertical;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: none;
    }

    button {
      border: none;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      padding: 0 16px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button.secondary {
      background: #eef2f7;
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.secondary:hover {
      background: #e3e9f2;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .tip {
      color: #6b7280;
      font-size: 13px;
      margin-top: 8px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e8f1ff;
      color: #2c4b83;
      font-size: 12px;
      margin-bottom: 10px;
    }

    @media (max-width: 860px) {
      .chat-box {
        height: 320px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="panel">
      <h2>Chat</h2>
      <div class="badge">inferflowEngine + Session 存储</div>
      <div id="chatBox" class="chat-box"></div>
      <div class="input-area">
        <textarea id="msgInput" placeholder="Model will reply based on chat history."></textarea>
        <button id="sendBtn">发送</button>
        <button id="clearBtn" class="secondary">清空</button>
      </div>
      <div id="chatTip" class="tip"></div>
    </section>

  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const chatTip = document.getElementById('chatTip');

    function renderHistory(history) {
      chatBox.innerHTML = '';
      for (const item of history) {
        const row = document.createElement('div');
        row.className = 'row';
        const role = document.createElement('strong');
        role.className = 'role-' + item.role;
        role.textContent = '[' + item.role + '] ';
        row.appendChild(role);
        row.appendChild(document.createTextNode(item.content || ''));
        chatBox.appendChild(row);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function loadHistory() {
      chatTip.textContent = '加载历史中...';
      try {
        const res = await fetch('/chat/history');
        const data = await res.json();
        if (!res.ok) {
          chatTip.textContent = data.message || '加载历史失败';
          return;
        }

        renderHistory(data.history || []);
        chatTip.textContent = (data.history || []).length > 0
          ? '已加载历史对话'
          : '当前账号暂无历史对话';
      } catch (e) {
        chatTip.textContent = '加载历史失败，请检查服务连接';
      }
    }

    async function sendMessage() {
      const message = msgInput.value.trim();
      if (!message) {
        chatTip.textContent = '请输入消息';
        return;
      }

      chatTip.textContent = '推理中...';
      sendBtn.disabled = true;
      clearBtn.disabled = true;
      try {
        const res = await fetch('/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, max_tokens: 128 })
        });

        const data = await res.json();
        if (!res.ok) {
          chatTip.textContent = data.message || '发送失败';
          return;
        }

        renderHistory(data.history || []);
        msgInput.value = '';
        chatTip.textContent = '已保存到会话历史';
      } catch (e) {
        chatTip.textContent = '请求失败，请检查服务连接';
      } finally {
        sendBtn.disabled = false;
        clearBtn.disabled = false;
      }
    }

    async function clearChat() {
      chatTip.textContent = '清空中...';
      sendBtn.disabled = true;
      clearBtn.disabled = true;
      try {
        const res = await fetch('/chat/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        const data = await res.json();
        if (!res.ok) {
          chatTip.textContent = data.message || '清空失败';
          return;
        }

        renderHistory([]);
        msgInput.value = '';
        chatTip.textContent = data.kv_cache_reset
          ? '历史与模型缓存已清空'
          : '历史已清空';
      } catch (e) {
        chatTip.textContent = '请求失败，请检查服务连接';
      } finally {
        sendBtn.disabled = false;
        clearBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    clearBtn.addEventListener('click', clearChat);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    loadHistory();
  </script>
</body>

</html>
