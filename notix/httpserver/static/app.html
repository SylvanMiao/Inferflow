<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>功能页</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --line: #d9e1ef;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #1f6feb;
      --primary-hover: #1858bd;
      --good: #0b8a5b;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef3ff 0%, var(--bg) 50%, #eef8f5 100%);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    .wrap {
      max-width: 1080px;
      width: 100%;
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(40, 56, 90, 0.08);
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .chat-box {
      height: 420px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fbfdff;
    }

    .row {
      margin-bottom: 10px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .role-user {
      color: #0b6bcb;
    }

    .role-assistant {
      color: #0b8a5b;
    }

    .input-area {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }

    textarea {
      flex: 1;
      min-height: 60px;
      resize: vertical;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: none;
    }

    button {
      border: none;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      padding: 0 16px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button.secondary {
      background: #eef2f7;
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.secondary:hover {
      background: #e3e9f2;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .tip {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e8f1ff;
      color: #2c4b83;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .metrics-panel {
      position: sticky;
      top: 16px;
    }

    .metrics-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .metrics-head h2 {
      margin: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cbd5e1;
      box-shadow: 0 0 0 4px #f1f5f9;
    }

    .status-dot.active {
      background: var(--good);
      box-shadow: 0 0 0 4px #dcfce7;
    }

    .metric-grid {
      display: grid;
      gap: 10px;
    }

    .metric-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfdff;
      padding: 12px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }

    .metric-unit {
      color: var(--muted);
      font-size: 12px;
      margin-left: 4px;
      font-weight: 400;
    }

    .metrics-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 860px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .metrics-panel {
        position: static;
      }

      .chat-box {
        height: 320px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="panel">
      <h2>Chat</h2>
      <div class="badge">inferflowEngine + Session 存储</div>
      <div id="chatBox" class="chat-box"></div>
      <div class="input-area">
        <textarea id="msgInput" placeholder="Model will reply based on chat history."></textarea>
        <button id="sendBtn">发送</button>
        <button id="clearBtn" class="secondary">清空</button>
      </div>
      <div id="chatTip" class="tip"></div>
    </section>

    <aside class="panel metrics-panel">
      <div class="metrics-head">
        <h2>Metrics</h2>
        <span id="metricsDot" class="status-dot"></span>
      </div>
      <div class="badge">Prefill / Decode</div>
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-label">Decode Throughput</div>
          <div class="metric-value"><span id="metricTok">--</span><span class="metric-unit">tok/s</span></div>
        </div>
        <div class="metric-card">
          <div class="metric-label">First Token</div>
          <div class="metric-value"><span id="metricFirst">--</span><span class="metric-unit">ms</span></div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Prefill</div>
          <div class="metric-value"><span id="metricPrefill">--</span><span class="metric-unit">ms</span></div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Decode</div>
          <div class="metric-value"><span id="metricDecode">--</span><span class="metric-unit">ms</span></div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Tokens</div>
          <div class="metric-value"><span id="metricTokens">--</span></div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Total</div>
          <div class="metric-value"><span id="metricTotal">--</span><span class="metric-unit">ms</span></div>
        </div>
      </div>
      <div id="metricsNote" class="metrics-note">等待第一次模型回复。</div>
    </aside>

  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const chatTip = document.getElementById('chatTip');
    const metricsDot = document.getElementById('metricsDot');
    const metricsNote = document.getElementById('metricsNote');
    const metricTok = document.getElementById('metricTok');
    const metricFirst = document.getElementById('metricFirst');
    const metricPrefill = document.getElementById('metricPrefill');
    const metricDecode = document.getElementById('metricDecode');
    const metricTokens = document.getElementById('metricTokens');
    const metricTotal = document.getElementById('metricTotal');

    function formatMs(value) {
      if (typeof value !== 'number' || !Number.isFinite(value)) {
        return '--';
      }
      return value >= 100 ? Math.round(value).toString() : value.toFixed(1);
    }

    function formatRate(value) {
      if (typeof value !== 'number' || !Number.isFinite(value)) {
        return '--';
      }
      return value >= 10 ? value.toFixed(1) : value.toFixed(2);
    }

    function renderMetrics(metrics) {
      if (!metrics) {
        metricsDot.classList.remove('active');
        metricTok.textContent = '--';
        metricFirst.textContent = '--';
        metricPrefill.textContent = '--';
        metricDecode.textContent = '--';
        metricTokens.textContent = '--';
        metricTotal.textContent = '--';
        metricsNote.textContent = '等待第一次模型回复。';
        return;
      }

      metricsDot.classList.add('active');
      metricTok.textContent = formatRate(metrics.decode_tokens_per_second);
      metricFirst.textContent = formatMs(metrics.first_token_ms);
      metricPrefill.textContent = formatMs(metrics.prefill_ms);
      metricDecode.textContent = formatMs(metrics.decode_ms);
      metricTokens.textContent = `${metrics.prompt_tokens || 0} / ${metrics.generated_tokens || 0}`;
      metricTotal.textContent = formatMs(metrics.total_ms);
      metricsNote.textContent = 'update per quest. Tokens : prompt / generated';
    }

    function renderHistory(history) {
      chatBox.innerHTML = '';
      for (const item of history) {
        const row = document.createElement('div');
        row.className = 'row';
        const role = document.createElement('strong');
        role.className = 'role-' + item.role;
        role.textContent = '[' + item.role + '] ';
        row.appendChild(role);
        row.appendChild(document.createTextNode(item.content || ''));
        chatBox.appendChild(row);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function loadHistory() {
      chatTip.textContent = '加载历史中...';
      try {
        const res = await fetch('/chat/history');
        const data = await res.json();
        if (!res.ok) {
          chatTip.textContent = data.message || '加载历史失败';
          return;
        }

        renderHistory(data.history || []);
        chatTip.textContent = (data.history || []).length > 0
          ? '已加载历史对话'
          : '当前账号暂无历史对话';
      } catch (e) {
        chatTip.textContent = '加载历史失败，请检查服务连接';
      }
    }

    async function sendMessage() {
      const message = msgInput.value.trim();
      if (!message) {
        chatTip.textContent = '请输入消息';
        return;
      }

      chatTip.textContent = '推理中...';
      sendBtn.disabled = true;
      clearBtn.disabled = true;
      try {
        const res = await fetch('/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, max_tokens: 128 })
        });

        const data = await res.json();
        if (!res.ok) {
          chatTip.textContent = data.message || '发送失败';
          return;
        }

        renderHistory(data.history || []);
        renderMetrics(data.metrics);
        msgInput.value = '';
        chatTip.textContent = '';
      } catch (e) {
        chatTip.textContent = '请求失败，请检查服务连接';
      } finally {
        sendBtn.disabled = false;
        clearBtn.disabled = false;
      }
    }

    async function clearChat() {
      chatTip.textContent = '清空中...';
      sendBtn.disabled = true;
      clearBtn.disabled = true;
      try {
        const res = await fetch('/chat/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        const data = await res.json();
        if (!res.ok) {
          chatTip.textContent = data.message || '清空失败';
          return;
        }

        renderHistory([]);
        renderMetrics(null);
        msgInput.value = '';
        chatTip.textContent = data.kv_cache_reset
          ? '历史与模型缓存已清空'
          : '历史已清空';
      } catch (e) {
        chatTip.textContent = '请求失败，请检查服务连接';
      } finally {
        sendBtn.disabled = false;
        clearBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    clearBtn.addEventListener('click', clearChat);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    loadHistory();
  </script>
</body>

</html>
